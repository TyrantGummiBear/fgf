# Translate ShadowFront docs — no local Python deps required.
# Mounts this folder (shadowfront/) into the container; writes to locales/<lang>/.

services:
  translate:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    volumes:
      - .:/docs:rw
    environment:
      DEEPL_AUTH_KEY: ${DEEPL_AUTH_KEY:-}

  fix-links:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    volumes:
      - .:/docs:rw
    entrypoint: ["python", "/docs/scripts/fix_locale_links.py"]
    command: []
